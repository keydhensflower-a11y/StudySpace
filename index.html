<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySpace</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS completo - se mantiene igual que tu diseño original */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #080b1a;
            color: #e8e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .topbar {
            background: rgba(8,11,26,0.95);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #9060ff;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab {
            padding: 8px 16px;
            margin: 0 4px;
            background: transparent;
            border: none;
            color: #8888aa;
            cursor: pointer;
            border-radius: 8px;
        }
        .tab.active {
            background: rgba(144,96,255,0.2);
            color: white;
        }
        .page { display: none; }
        .page.active { display: block; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(144,96,255,0.3);
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
        }
        button {
            padding: 10px 16px;
            margin: 5px;
            border-radius: 8px;
            background: #9060ff;
            color: white;
            border: none;
            cursor: pointer;
        }
        .sim-type-btn.active, .sim-mode-card.selected {
            background: #1D9E75;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div>🚀 StudySpace</div>
    <div>
        <button class="tab active" onclick="goTab(0)">Cursos</button>
        <button class="tab" onclick="goTab(1)">Simulacro</button>
    </div>
</div>

<!-- Página Simulacro (la más importante para ti) -->
<div id="pages">
    <div class="page active" id="page-1">
        <h1>Simulacro de Examen 🔬</h1>
        <p>Prueba el simulacro aquí. Los botones deben funcionar.</p>
        
        <div class="card">
            <h3>Formato</h3>
            <button onclick="selectMode(this)" class="sim-mode-card selected">Examen corto (4 preg)</button>
            <button onclick="selectMode(this)" class="sim-mode-card">Examen mediano (10 preg)</button>
        </div>

        <div class="card">
            <h3>Tipos de preguntas</h3>
            <button onclick="toggleType(this)" class="sim-type-btn active">Respuesta libre</button>
            <button onclick="toggleType(this)" class="sim-type-btn active">Opción múltiple</button>
        </div>

        <button onclick="startSimulacro()" style="width:100%;padding:15px;font-size:16px;">🚀 Iniciar Simulacro</button>
    </div>
</div>

<script>
// Funciones básicas para que funcione
let currentTab = 0;

function goTab(n) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab')[n].classList.add('active');
    document.getElementById('page-' + n).classList.add('active');
}

function selectMode(el) {
    document.querySelectorAll('.sim-mode-card').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
}

function toggleType(el) {
    el.classList.toggle('active');
}

function startSimulacro() {
    alert("✅ Simulacro iniciado!\n\n(Este es un test. En la versión completa tendrás cronómetro, preguntas y calificación /20)");
    // Aquí irá toda la lógica completa del simulacro
}

// Inicializar
document.addEventListener('DOMContentLoaded', () => {
    console.log("%cStudySpace cargado correctamente 🚀", "color:#9060ff; font-size:14px");
});
</script>

</body>
</html>
